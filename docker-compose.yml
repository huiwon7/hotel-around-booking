services:
  db:
    image: postgres:16-alpine
    container_name: hotel-around-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hotel_around
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
